name: MCOC Store Automation 1

on:
  schedule:
    - cron: '0 6 * * *'  # 8:00 AM Poland summer time (UTC+2)
  workflow_dispatch:

jobs:
  run-store:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Write credentials and config from secrets
        run: |
          echo '${{ secrets.CREDENTIALS_JSON }}' > credentials.json
          echo '${{ secrets.CONFIG_JSON }}' > config.json

      - name: Run store script
        run: node login3.ts

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: '*.png'
          retention-days: 3